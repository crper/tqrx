# pre-commit 只做快而稳定的自动修正。
# 这里先把 Go 文件格式化掉，尽量让提交前的机械问题本地就消失。
pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true

# pre-push 跑完整但仍然属于"开发者本地可接受"的质量门禁。
# 这些命令和 CI 的核心门禁保持一致，避免本地通过、远端失败。
pre-push:
  commands:
    test:
      run: go test ./...
    vet:
      run: go vet ./...
    build:
      run: go build ./...
