version: 2

project_name: tqrx

before:
  hooks:
    - go test ./...

builds:
  - id: tqrx
    main: .
    binary: tqrx
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: tqrx
    ids:
      - tqrx
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

homebrew_casks:
  - ids:
      - tqrx
    name: tqrx
    binaries:
      - tqrx
    repository:
      owner: crper
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/crper/tqrx"
    description: "Tiny Go QR generator with CLI and terminal UI"
    license: "MIT"
    url:
      verified: "github.com/crper/tqrx/"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tqrx"]
          end

release:
  github:
    owner: crper
    name: tqrx

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: git
